<!DOCTYPE html>
<html>

<head>
    <title>Weekly Forecast</title>
    <link rel="stylesheet" href="TemperatureStyle.css">
    <script src="https://kit.fontawesome.com/cc3bc34a67.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>
        <table>
            <tr>
                <td>
                    <div class="cloud"><i class="fa-solid fa-cloud"></i></div>
                </td>
                <td>
                    <h1>Check the Weather!</h1>
                </td>
                <td>
                    <div class="menu">
                        <button class="menu-button"><i class="fa fa-bars" aria-hidden="true"></i></button>
                        <div class="option">
                            <a href="index.html">Home</a>
                            <button id="openDialoge">Weekly Forecast</button>
                        </div>
                    </div>
                </td>
            </tr>
        </table>
    </header>
    <dialog id="weeklySearch">
        <h1>Weekly Forecast by ZipCode</h1>
        <form id="weeklySearchForm" action="/weeklyForcast.html">
            <label>Enter Zip Code:</label>
            <input type="text" id="zipcodeWeek" />

            <br><br>

            <label>Select Temperature Measurement:</label>

            <input type="radio" name="tempTypeWeek" value="fahrenheit">
            Fahrenheit

            <input type="radio" name="tempTypeWeek" value="celsius">
            Celsius

            <br><br>

            <button class="searchButton">Search <i class="fa-solid fa-magnifying-glass"></i></button>
            <button id="closeButton">Close</button>

            <h1 id="errMessage"></h1>
        </form>
    </dialog>
    <main>
        <h1>Weekly Forecast Results</h1>
        <table class="resultTable">
            <tr>
                <td></td>
                <td>Today</td>
                <td id="day2"></td>
                <td id="day3"></td>
                <td id="day4"></td>
                <td id="day5"></td>
                <td id="day6"></td>
                <td id="day7"></td>
            </tr>
            <tr>
                <td>High</td>
                <td id="high0"></td>
                <td id="high1"></td>
                <td id="high2"></td>
                <td id="high3"></td>
                <td id="high4"></td>
                <td id="high5"></td>
                <td id="high6"></td>
            </tr>
            <tr>
                <td>Current</td>
                <td id="curr0"></td>
                <td id="curr1"></td>
                <td id="curr2"></td>
                <td id="curr3"></td>
                <td id="curr4"></td>
                <td id="curr5"></td>
                <td id="curr6"></td>
            </tr>
            <tr>
                <td>Low</td>
                <td id="low0"></td>
                <td id="low1"></td>
                <td id="low2"></td>
                <td id="low3"></td>
                <td id="low4"></td>
                <td id="low5"></td>
                <td id="low6"></td>
            </tr>
        </table>
        <h1 id="error"></h1>
    </main>

    <script src="apiController.js"></script>
    <script src="dialogeController.js"></script>
    <script>
        performWeeklySearch();
    </script>
</body>

</html>
