<!DOCTYPE html>
<html>

<head>
    <title>Temperature API</title>
    <link rel="stylesheet" href="TemperatureStyle.css">
    <script src="https://kit.fontawesome.com/cc3bc34a67.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>
        <table>
            <tr>
                <td>
                    <div class="cloud"><i class="fa-solid fa-cloud"></i></div>
                </td>
                <td>
                    <h1>Check the Weather!</h1>
                </td>
                <td>
                    <div class="menu">
                        <button class="menu-button"><i class="fa fa-bars" aria-hidden="true"></i></button>
                        <div class="option">
                            <a href="index.html">Home</a>
                            <button id="openDialoge">Weekly Forecast</button>
                        </div>
                    </div>
                </td>
            </tr>
        </table>
    </header>
    <dialog id="weeklySearch">
        <h1>Weekly Forecast by ZipCode</h1>
        <form id="weeklySearchForm" action="/weeklyForecast.html">
            <label>Enter Zip Code:</label>
            <input type="text" id="zipcodeWeek" />

            <br><br>

            <label>Select Temperature Measurement:</label>

            <input type="radio" name="tempTypeWeek" value="fahrenheit">
            Fahrenheit

            <input type="radio" name="tempTypeWeek" value="celsius">
            Celsius


            <br><br>

            <button class="searchButton">Search <i class="fa-solid fa-magnifying-glass"></i></button>
            <button id="closeButton">Close</button>

            <h1 id="errMessage"></h1>
        </form>
    </dialog>
    <main>
        <h1>Search for Temperature by Zip Code</h1>

        <label>Enter Zip Code:</label>
        <input type="text" id="zipcode" />

        <br><br>

        <label>Select Temperature Measurement:</label>

        <input type="radio" name="tempType" value="fahrenheit">
        Fahrenheit

        <input type="radio" name="tempType" value="celsius">
        Celsius


        <br><br>

        <button class="searchButton" onclick="performSearch()">Search <i
                class="fa-solid fa-magnifying-glass"></i></button>


        <table class="resultTable">
            <tr>
                <td>
                    <h2 id="result"></h2>
                </td>
            </tr>
        </table>

        <script src="dialogeController.js">
        </script>
        <script src="apiController.js"></script>
    </main>
</body>

</footer>

</html>
